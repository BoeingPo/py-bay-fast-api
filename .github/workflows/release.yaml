name: Release on version tag

on:
  push:
    tags:
      - 'v*'

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: boeingpo
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/Dockerfile
          push: true
          tags: |
            boeingpo/py-bay-fast-api:${{ github.ref_name }}
            boeingpo/py-bay-fast-api:latest

      - name: Switch to main
        run: |
          git fetch origin main
          git checkout main

      - name: Bump image tag in k8s/deployment.yaml
        run: |
          sed -i "s|image: boeingpo/py-bay-fast-api:.*|image: boeingpo/py-bay-fast-api:${{ github.ref_name }}|" k8s/deployment.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "deploy: boeingpo/py-bay-fast-api:${{ github.ref_name }}"
          git push origin main
